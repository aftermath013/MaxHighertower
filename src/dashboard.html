<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNX Brief Builder — Dashboard</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-logo">CNX<span> | Brief Builder</span></div>
  <div class="nav-tag">Admin Dashboard</div>
</nav>

<!-- Password gate -->
<div class="gate" id="gate">
  <div class="gate-card">
    <h2>Admin Access</h2>
    <p>Enter the admin password to continue.</p>
    <div class="form-group">
      <input class="form-input" type="password" id="gate-password" placeholder="Password" style="text-align:center;">
    </div>
    <button class="btn-submit" onclick="unlock()" style="margin-top:0;">Enter</button>
    <div class="status-box status-error" id="gate-error" style="margin-top:12px;"></div>
  </div>
</div>

<!-- Dashboard content (hidden until unlocked) -->
<div class="container" id="dashboard" style="display:none; padding-top:80px; max-width:1100px;">
  <div class="dash-header">
    <h1>Brief Requests</h1>
    <p>Approve pending requests to trigger AI generation.</p>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    Loading projects...
  </div>

  <div class="table-wrap" id="table-wrap" style="display:none;">
    <table class="projects">
      <thead>
        <tr>
          <th>Client</th>
          <th>LOB Scope</th>
          <th>Location</th>
          <th>Requested By</th>
          <th>Submitted</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="projects-body"></tbody>
    </table>
  </div>

  <div id="empty-state" style="display:none;" class="loading">No requests yet.</div>
</div>

<script src="/js/dashboard.js"></script>
</body>
</html>
